<?xml version="1.0" encoding="UTF-8"?>
<!--
  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•—
  в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•қ
  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв•”в•қ
  в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘ в–Ҳв–Ҳв•”в–Ҳв–Ҳв•—
  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв•—
  в•ҡв•җв•қ  в•ҡв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ
  RudraX вҖ” Premium Brand Logo  |  Monochrome Edition
  Transparent Background  |  Vector-Scale Ready
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 900 480"
     width="900"
     height="480"
     role="img"
     aria-label="RudraX Logo">

  <title>RudraX</title>

  <defs>

    <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
    <!--  METALLIC BEVEL GRADIENT (across bar)  -->
    <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
    <linearGradient id="metalBevel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#787878"/>
      <stop offset="8%"   stop-color="#484848"/>
      <stop offset="22%"  stop-color="#1c1c1c"/>
      <stop offset="50%"  stop-color="#060606"/>
      <stop offset="78%"  stop-color="#1c1c1c"/>
      <stop offset="92%"  stop-color="#484848"/>
      <stop offset="100%" stop-color="#727272"/>
    </linearGradient>

    <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
    <!--  OVERLAY SHEEN (subtle top highlight)  -->
    <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
    <linearGradient id="topSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="35%"  stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
    <!--  CENTER GLOW (intersection ambiance)   -->
    <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
    <!--  RUDRA TEXT GRADIENT (white-to-silver) -->
    <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="55%"  stop-color="#F0F0F0"/>
      <stop offset="100%" stop-color="#C8C8C8"/>
    </linearGradient>

    <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
    <!--  ACCENT LINE GRADIENT                  -->
    <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
    <linearGradient id="lineGradL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#888888" stop-opacity="0"/>
      <stop offset="100%" stop-color="#888888" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="lineGradR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#888888" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#888888" stop-opacity="0"/>
    </linearGradient>

    <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
    <!--  FILTERS                               -->
    <!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->

    <!-- Deep drop shadow for primary X arm -->
    <filter id="shadowDeep" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="16"
        flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <!-- Lighter shadow for secondary arm (to avoid double-dark crossing) -->
    <filter id="shadowLight" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="4" stdDeviation="10"
        flood-color="#000000" flood-opacity="0.30"/>
    </filter>

    <!-- RUDRA text depth shadow -->
    <filter id="textShadow" x="-8%" y="-25%" width="116%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="6"
        flood-color="#000000" flood-opacity="0.85"/>
    </filter>

    <!-- Subtle inner glow mask for bar edges -->
    <filter id="edgeGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="0" dy="-1" result="offsetBlur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.2" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="inner"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="inner"/>
      </feMerge>
    </filter>

  </defs>


  <!-- в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•— -->
  <!-- в•‘             X  M A R K                   в•‘ -->
  <!-- в•‘   Two geometric bars вҖ” the core symbol   в•‘ -->
  <!-- в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ -->

  <!--
    Bar dimensions: 102 px wide Г— 420 px tall
    Rect center:    (450, 240) вҖ” both bars share this center
    Rotation:       Вұ45В° about the center point
    Corner radius:  14 px вҖ” modern, refined edge
  -->

  <!-- Bar A  в•І  (rotate вҲ’45В°: upper-left вҶ’ lower-right) -->
  <rect x="399" y="30" width="102" height="420" rx="14" ry="14"
        transform="rotate(-45 450 240)"
        fill="url(#metalBevel)"
        filter="url(#shadowDeep)"/>

  <!-- Bar A вҖ” top sheen overlay -->
  <rect x="399" y="30" width="102" height="420" rx="14" ry="14"
        transform="rotate(-45 450 240)"
        fill="url(#topSheen)"/>

  <!-- Bar B  в•ұ  (rotate +45В°: upper-right вҶ’ lower-left) -->
  <rect x="399" y="30" width="102" height="420" rx="14" ry="14"
        transform="rotate(45 450 240)"
        fill="url(#metalBevel)"
        filter="url(#shadowLight)"/>

  <!-- Bar B вҖ” top sheen overlay -->
  <rect x="399" y="30" width="102" height="420" rx="14" ry="14"
        transform="rotate(45 450 240)"
        fill="url(#topSheen)"/>

  <!-- Center intersection ambient glow -->
  <ellipse cx="450" cy="240" rx="96" ry="96"
           fill="url(#centerGlow)"/>

  <!-- Thin diamond accent at the intersection center -->
  <rect x="437" y="227" width="26" height="26" rx="2" ry="2"
        transform="rotate(45 450 240)"
        fill="none"
        stroke="#888888"
        stroke-width="0.8"
        opacity="0.35"/>


  <!-- в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•— -->
  <!-- в•‘          R U D R A   T E X T             в•‘ -->
  <!-- в•‘   White letterforms over the X mark      в•‘ -->
  <!-- в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ -->

  <!-- Accent line вҖ” LEFT fade-in -->
  <line x1="92" y1="242" x2="268" y2="242"
        stroke="url(#lineGradL)"
        stroke-width="1.2"
        stroke-linecap="round"/>

  <!-- Accent line вҖ” RIGHT fade-out -->
  <line x1="632" y1="242" x2="808" y2="242"
        stroke="url(#lineGradR)"
        stroke-width="1.2"
        stroke-linecap="round"/>

  <!-- "RUDRA" вҖ” primary logotype text -->
  <text x="450" y="270"
        font-family="'Arial Black', 'Franklin Gothic Heavy', Impact, 'Helvetica Neue', sans-serif"
        font-size="78"
        font-weight="900"
        letter-spacing="22"
        text-anchor="middle"
        fill="url(#textGrad)"
        filter="url(#textShadow)">RUDRA</text>

  <!-- Thin rule below RUDRA text -->
  <line x1="306" y1="288" x2="594" y2="288"
        stroke="#888888"
        stroke-width="0.8"
        stroke-linecap="round"
        opacity="0.45"/>

  <!-- Brand tagline вҖ” "RudraX" word-mark in refined small caps -->
  <text x="450" y="316"
        font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
        font-size="13"
        font-weight="400"
        letter-spacing="9.5"
        text-anchor="middle"
        fill="#b0b0b0"
        opacity="0.75">RUDRAX</text>


  <!-- в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•— -->
  <!-- в•‘          CORNER  REGISTRATION            в•‘ -->
  <!-- в•‘  Micro tick marks вҖ” optional brand grid  в•‘ -->
  <!-- в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ -->

  <!-- Upper-left registration tick -->
  <g opacity="0.18" stroke="#cccccc" stroke-width="1" stroke-linecap="round">
    <line x1="48" y1="60"  x2="68"  y2="60"/>
    <line x1="48" y1="60"  x2="48"  y2="80"/>
  </g>

  <!-- Upper-right registration tick -->
  <g opacity="0.18" stroke="#cccccc" stroke-width="1" stroke-linecap="round">
    <line x1="852" y1="60"  x2="832" y2="60"/>
    <line x1="852" y1="60"  x2="852" y2="80"/>
  </g>

  <!-- Lower-left registration tick -->
  <g opacity="0.18" stroke="#cccccc" stroke-width="1" stroke-linecap="round">
    <line x1="48" y1="420" x2="68"  y2="420"/>
    <line x1="48" y1="420" x2="48"  y2="400"/>
  </g>

  <!-- Lower-right registration tick -->
  <g opacity="0.18" stroke="#cccccc" stroke-width="1" stroke-linecap="round">
    <line x1="852" y1="420" x2="832" y2="420"/>
    <line x1="852" y1="420" x2="852" y2="400"/>
  </g>

</svg>
